services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: ${TASKLIST_DATABASE_URL:-file:/app/backend/prisma/tasklist.db}
      PORT: ${TASKLIST_BACKEND_PORT:-4000}
      HOST: 0.0.0.0
      FRONTEND_ORIGIN: ${TASKLIST_FRONTEND_ORIGIN:-https://www.tasklist.com}
      ALLOW_FILE_ORIGIN: "false"
    volumes:
      - tasklist-db:/app/backend/prisma
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    restart: unless-stopped

  proxy:
    image: caddy:2-alpine
    depends_on:
      - web
      - backend
    ports:
      - "${TASKLIST_HTTP_PORT:-80}:80"
      - "${TASKLIST_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      TASKLIST_DOMAIN: ${TASKLIST_DOMAIN:-www.tasklist.com}
    restart: unless-stopped

volumes:
  tasklist-db:
  caddy-data:
  caddy-config:
