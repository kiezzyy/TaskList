name: Desktop Release

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
      - created
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            script: dist:win
            artifact: release/*.exe
            upload_name: TaskList-Windows
          - name: macOS
            os: macos-latest
            script: dist:mac
            artifact: release/*.dmg
            upload_name: TaskList-macOS
          - name: Linux
            os: ubuntu-latest
            script: dist:linux
            artifact: release/*.AppImage
            upload_name: TaskList-Linux
          - name: Android
            os: ubuntu-latest
            script: mobile:apk
            artifact: release/TaskList-${{ github.ref_name }}-android.apk
            setup_java: true
            setup_android: true
            upload_name: TaskList-Android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Setup Java
        if: matrix.setup_java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        if: matrix.setup_android
        uses: android-actions/setup-android@v3

      - name: Generate Prisma client
        if: matrix.name != 'Android'
        run: npm run prisma:generate --prefix backend

      - name: Run backend tests
        if: matrix.name != 'Android'
        run: npm run test --prefix backend

      - name: Build and package desktop app
        if: matrix.name != 'Android'
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build Android APK
        if: matrix.name == 'Android'
        run: npm run ${{ matrix.script }}
        env:
          TASKLIST_WEB_URL: ${{ vars.TASKLIST_WEB_URL }}

      - name: Stage Android APK for release
        if: matrix.name == 'Android'
        shell: bash
        run: |
          mkdir -p release
          cp mobile/android/app/build/outputs/apk/debug/app-debug.apk "release/TaskList-${GITHUB_REF_NAME}-android.apk"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.upload_name }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

      - name: Attach binaries to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
